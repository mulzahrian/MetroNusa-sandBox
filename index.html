<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>City Empire: Modern Metropolis</title>
<style>
:root{--bg-0:#0b0f17;--bg-2:#1a2233;--panel:rgba(18,24,38,.88);--panel-strong:rgba(11,15,23,.96);--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.16);--text:#e6ecf5;--text-dim:#9aa6bd;--accent:#4cc9f0;--accent-2:#7c5cff;--good:#4ade80;--warn:#facc15;--bad:#ef4444;--shadow:0 8px 32px rgba(0,0,0,.45);--radius:10px;--radius-sm:6px;font-family:'Segoe UI',Roboto,system-ui,sans-serif}
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--bg-0);color:var(--text);user-select:none}
#app,#game-canvas,#ui-root{position:absolute;inset:0}
#game-canvas{display:block;z-index:0}
#ui-root{z-index:10;pointer-events:none}
#ui-root>*{pointer-events:auto}
button{font-family:inherit;cursor:pointer;color:var(--text);background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;transition:all .15s}
button:hover{background:#243049;border-color:var(--border-strong)}
button:active{transform:translateY(1px)}
button.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#0b0f17;font-weight:600}
button.primary:hover{filter:brightness(1.1)}

/* Main menu */
#main-menu{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,rgba(124,92,255,.25),transparent 60%),radial-gradient(ellipse at bottom,rgba(76,201,240,.25),transparent 60%),linear-gradient(180deg,#0b0f17 0%,#060810 100%);z-index:50;text-align:center}
#main-menu h1{font-size:64px;font-weight:800;margin:0;background:linear-gradient(135deg,#4cc9f0,#7c5cff,#f72585);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:2px;text-shadow:0 0 60px rgba(124,92,255,.35)}
#main-menu .subtitle{color:var(--text-dim);margin:6px 0 40px;letter-spacing:6px;text-transform:uppercase;font-size:13px}
#main-menu .menu-buttons{display:flex;flex-direction:column;gap:12px;width:300px}
#main-menu .menu-buttons button{padding:14px 18px;font-size:15px;border-radius:var(--radius);background:rgba(255,255,255,.04);border:1px solid var(--border);text-align:left;display:flex;align-items:center;gap:12px}
#main-menu .menu-buttons button:hover{background:rgba(124,92,255,.15);border-color:rgba(124,92,255,.4)}
#main-menu .menu-buttons button .icon{width:22px;font-size:18px;text-align:center}
#main-menu .menu-buttons button.disabled{opacity:.4;cursor:not-allowed}
#main-menu .footer{position:absolute;bottom:16px;color:var(--text-dim);font-size:12px;letter-spacing:1px}

/* Top status bar */
#top-bar{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;padding:0 16px;gap:14px;background:linear-gradient(180deg,var(--panel-strong),rgba(11,15,23,.6));border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.stat{display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:var(--radius-sm);background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:13px;min-width:90px}
.stat .icon{font-size:16px}
.stat .label{color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.stat .value{font-weight:600}
.stat.good .value{color:var(--good)}
.stat.warn .value{color:var(--warn)}
.stat.bad .value{color:var(--bad)}
.spacer{flex:1}
.speed-controls{display:flex;gap:4px;background:rgba(0,0,0,.3);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.speed-controls button{padding:4px 10px;background:transparent;border:none;color:var(--text-dim);min-width:30px}
.speed-controls button.active{background:var(--accent);color:#0b0f17;font-weight:700}

/* Construction bottom menu */
#construction-menu{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border-strong);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(10px);min-width:760px;max-width:92vw}
#construction-menu .categories{display:flex;gap:4px;flex-wrap:wrap}
#construction-menu .categories button{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:12px;background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text-dim)}
#construction-menu .categories button.active{background:rgba(76,201,240,.15);border-color:rgba(76,201,240,.5);color:var(--text)}
#construction-menu .items{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;min-height:90px}
#construction-menu .item{flex:0 0 100px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;text-align:center}
#construction-menu .item:hover{border-color:var(--accent);transform:translateY(-2px);background:rgba(76,201,240,.08)}
#construction-menu .item.active{border-color:var(--accent);background:rgba(76,201,240,.15)}
#construction-menu .item.locked{opacity:.4;cursor:not-allowed}
#construction-menu .item .icon{font-size:26px;margin-bottom:4px}
#construction-menu .item .name{font-size:11px;font-weight:600}
#construction-menu .item .cost{font-size:10px;color:var(--text-dim);margin-top:2px}

/* Side panels */
#info-panel{position:absolute;left:16px;top:72px;width:280px;background:var(--panel);border:1px solid var(--border-strong);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;backdrop-filter:blur(10px);font-size:13px}
#info-panel .title{font-size:16px;font-weight:700;margin-bottom:4px}
#info-panel .subtitle{color:var(--text-dim);font-size:11px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
#info-panel .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--border)}
#info-panel .row:last-child{border-bottom:none}

#notification-center{position:absolute;right:16px;top:72px;width:280px;max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.notification{background:var(--panel);border:1px solid var(--border-strong);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;box-shadow:var(--shadow);backdrop-filter:blur(10px);animation:slideIn .3s ease-out;cursor:pointer}
.notification.success{border-left-color:var(--good)}
.notification.warn{border-left-color:var(--warn)}
.notification.danger{border-left-color:var(--bad)}
.notification .head{display:flex;justify-content:space-between;font-weight:600;margin-bottom:2px}
.notification .body{color:var(--text-dim)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

#mini-map{position:absolute;right:16px;bottom:16px;width:220px;background:var(--panel);border:1px solid var(--border-strong);border-radius:var(--radius);box-shadow:var(--shadow);padding:8px;backdrop-filter:blur(10px)}
#mini-map canvas{width:100%;height:180px;border-radius:var(--radius-sm);background:#0b1320;display:block}
#mini-map .modes{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
#mini-map .modes button{flex:1;font-size:10px;padding:4px 4px;background:transparent;border:1px solid var(--border);color:var(--text-dim);min-width:0}
#mini-map .modes button.active{background:var(--accent);color:#0b0f17;border-color:var(--accent)}

.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:40;backdrop-filter:blur(4px)}
.modal{width:min(900px,92vw);max-height:86vh;overflow-y:auto;background:var(--panel-strong);border:1px solid var(--border-strong);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.modal h2{margin:0 0 4px;font-size:22px}
.modal .sub{color:var(--text-dim);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px}
.modal .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.modal .card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.modal .card .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.modal .card .big{font-size:26px;font-weight:700;margin:4px 0 2px}
.modal .card .delta{font-size:11px;color:var(--text-dim)}
.modal .close-row{display:flex;justify-content:flex-end;margin-top:20px}
.bar{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:6px}
.bar>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2))}

#cursor-info{position:absolute;pointer-events:none;background:rgba(0,0,0,.8);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;z-index:30;white-space:nowrap;display:none}
.hidden{display:none!important}

#cheat-box{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border-strong);border-radius:var(--radius);padding:6px 12px;backdrop-filter:blur(10px);box-shadow:var(--shadow);z-index:40;min-width:320px}
#cheat-label{font-size:16px;cursor:default;user-select:none}
#cheat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit}
#cheat-input::placeholder{color:var(--text-dim);opacity:0.6}
#cheat-status{font-size:12px;white-space:nowrap}
#cheat-status.success{color:#4ade80}
#cheat-status.error{color:#f87171}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <canvas id="game-canvas"></canvas>
  <div id="ui-root"></div>
</div>
<script type="module" src="./game.js"></script>
</body>
</html>
